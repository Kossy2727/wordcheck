<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語マスターアプリ</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; box-sizing: border-box; }
        
        .btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 16px; box-sizing: border-box; transition: background 0.2s; }
        .btn:hover { background: #f0f0f0; }
        .btn-primary { background: #007bff; color: white; border: none; text-align: center; font-weight: bold; }
        .btn-primary:hover { background: #0056b3; }
        .btn-outline { background: #fff; color: #333; border: 2px solid #007bff; text-align: center; font-weight: bold; }
        .btn-outline:hover { background: #ebf5ff; }

        .screen { display: none; }
        .screen.active { display: block; }

        .title { font-size: 26px; font-weight: bold; margin-bottom: 25px; color: #333; }
        
        .hud { display: flex; justify-content: space-between; align-items: center; color: #666; font-size: 14px; margin-bottom: 15px; }
        .quit-btn { background: #e0e0e0; color: #555; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .quit-btn:hover { background: #d0d0d0; }

        .word { font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #007bff; line-height: 1.8; }
        rt { font-size: 13px; color: #666; font-weight: normal; }

        #result { font-size: 20px; font-weight: bold; margin: 15px 0; height: 25px; }
        #next-btn { display: none; margin: 0 auto; }

        .score-box { background: #e7f5ff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #b3d7ff; }
        .score-title { font-size: 22px; font-weight: bold; color: #007bff; margin-bottom: 10px; }

        .list-container { max-height: 380px; overflow-y: auto; text-align: left; border: 1px solid #ddd; border-radius: 6px; padding: 10px; background: #fafafa; margin-top: 12px; }
        .list-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .list-item:last-child { border-bottom: none; }
        
        .list-word { color: #007bff; width: 45%; word-break: break-all; line-height: 1.4; }
        .list-word-main { font-weight: bold; font-size: 15px; }
        .list-word-yomi { display: block; font-size: 11px; color: #777; font-weight: normal; margin-top: 2px; }

        .list-meaning { color: #555; width: 43%; word-break: break-all; padding-left: 5px; font-size: 14px; }
        .list-check { width: 12%; text-align: center; font-size: 16px; }
        
        .search-bar { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .clear-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 10px; }

        .progress-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 12px; margin-bottom: 12px; text-align: left; }
        .progress-text-container { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 14px; color: #495057; }
        .progress-percent { font-size: 20px; font-weight: bold; color: #28a745; }
        .progress-bar-bg { background: #e9ecef; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { background: #28a745; height: 100%; width: 0%; transition: width 0.5s ease; }

        /* 🥇 【追加】満点スタンプカードのスタイル */
        .medal-box { background: #fff9db; border: 2px dashed #fcc419; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .medal-title { font-size: 14px; font-weight: bold; color: #e67e22; margin-bottom: 8px; }
        .medal-slots { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .medal-slot { width: 32px; height: 32px; background: #fff; border: 1px solid #ffe3e3; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .medal-reset-btn { background: #f08c00; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; display: none; margin: 0 auto; }
        .medal-reset-btn:hover { background: #e67e22; }
    </style>
</head>
<body>

<div class="box">
    
    <div id="home-screen" class="screen active">
        <div class="title">単語マスター 📚</div>

        <!-- 🥇 【追加】ホーム画面のスタンプカード -->
        <div class="medal-box">
            <div class="medal-title" id="medal-message">💯 満点獲得メダル (0 / 10)</div>
            <div class="medal-slots" id="medal-slots-container"></div>
            <button class="medal-reset-btn" id="medal-clear-btn" onclick="resetMedalOnly()">🎖️ メダルをリセットする</button>
        </div>

        <button class="btn btn-primary" onclick="startQuizMode()">🔥 20問クイズに挑戦</button>
        <button class="btn btn-outline" onclick="startListMode()">📖 語句一覧を見る (<span id="total-words-count">0</span>語)</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="hud">
            <div>
                <div>問題: <span id="progress">0 / 20</span></div>
                <div>正解数: <span id="current-score">0</span></div>
            </div>
            <button class="quit-btn" onclick="quitQuiz()">✖ 中断</button>
        </div>
        <div class="word" id="question-word">読み込み中...</div>
        <div id="options-box"></div>
        <div id="result"></div>
        <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="score-screen" class="screen">
        <div class="score-box">
            <div class="score-title" id="score-header">結果発表 🎉</div>
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 8px;">20問中 <span id="correct-count">0</span> 問正解</div>
            <div style="font-size: 20px; font-weight: bold; color: #ff922b;">正解率: <span id="accuracy-rate">0</span>%</div>
            <!-- 🥇 【追加】満点時のメッセージエリア -->
            <div id="perfect-message" style="display:none; color:#28a745; font-weight:bold; margin-top:10px; font-size:16px;">🌟 満点！メダルをGETしました！ 🌟</div>
        </div>
        <button class="btn btn-primary" onclick="startQuizMode()">🔄 もう1回やる</button>
        <button class="btn btn-outline" onclick="goHome()">🏠 ホームに戻る</button>
    </div>

    <div id="list-screen" class="screen">
        <div class="title" style="font-size:20px; margin-bottom:15px;">語句一覧 📖</div>
        
        <div class="progress-box">
            <div class="progress-text-container">
                <div>現在の達成率: <span id="solved-count-text">0</span> / <span id="total-count-text">0</span> 語</div>
                <div><span id="progress-percent-text" class="progress-percent">0</span>%</div>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <input type="text" id="search-input" class="search-bar" placeholder="単語・よみ・意味で検索..." oninput="filterList()">
        <div class="list-container" id="words-list"></div>
        <button class="btn btn-outline" style="margin-top:15px; margin-bottom: 0;" onclick="goHome()">🏠 ホームに戻る</button>
        <button class="clear-btn" onclick="resetCheckedHistory()">クリア履歴をリセットする</button>
    </div>

</div>

<script>
// ★★★【ここにExcelのデータを丸ごと貼り付けます】★★★
const rawExcelData = `
愛嬌	あいきょう	にこにこして可愛らしいこと。相手を喜ばせるための言葉や行い。
愛護	あいご	可愛がって、大切にすること。良さを守って、保護すること。
相性	あいしょう	お互いの性格や好みがあうこと。人と人、人と物がしっくり合うかどうか。
`;
// ★★★【貼り付けここまで】★★★

    let allQuizList = [];
    let currentSet = [];
    let currentIndex = 0;
    let correctAnswers = 0;
    
    let solvedWords = JSON.parse(localStorage.getItem('solvedWords')) || [];
    // 🥇 【追加】メダルの枚数を記録するデータ（最大10）
    let medalCount = parseInt(localStorage.getItem('medalCount')) || 0;

    function parseData() {
        const lines = rawExcelData.trim().split('\n');
        lines.forEach(line => {
            const parts = line.split('\t');
            if(parts.length >= 3) {
                allQuizList.push({ 
                    word: parts[0].trim(), 
                    yomi: parts[1].trim(), 
                    meaning: parts[2].trim() 
                });
            }
        });
        document.getElementById('total-words-count').innerText = allQuizList.length;
        
        // 🥇 起動時にメダルスタンプカードを描画
        updateMedalDisplay();
        generateWordsList();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuizMode() {
        switchScreen('quiz-screen');
        
        let scrambledList = [...allQuizList].sort(() => Math.random() - 0.5);
        currentSet = scrambledList.slice(0, 20);
        
        currentIndex = 0;
        correctAnswers = 0;
        loadQuiz();
    }

    function loadQuiz() {
        document.getElementById('result').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('current-score').innerText = correctAnswers;
        document.getElementById('progress').innerText = `${currentIndex + 1} / 20`;
        
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = "";

        const currentQuiz = currentSet[currentIndex];
        document.getElementById('question-word').innerHTML = `<ruby>${currentQuiz.word}<rt>${currentQuiz.yomi}</rt></ruby>`;

        let dummys = [];
        while(dummys.length < 3) {
            let rand = allQuizList[Math.floor(Math.random() * allQuizList.length)].meaning;
            if(rand !== currentQuiz.meaning && !dummys.includes(rand)) {
                dummys.push(rand);
            }
        }

        let choices = [
            {text: currentQuiz.meaning, isCorrect: true}, 
            {text: dummys[0], isCorrect: false}, 
            {text: dummys[1], isCorrect: false}, 
            {text: dummys[2], isCorrect: false}
        ];
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = choice.text;
            btn.onclick = () => {
                const allBtns = optionsBox.querySelectorAll('.btn');
                allBtns.forEach(b => b.disabled = true);
                
                if(choice.isCorrect) {
                    document.getElementById('result').innerText = "⭕ 正解！";
                    btn.style.background = "#d4edda";
                    correctAnswers++;
                    document.getElementById('current-score').innerText = correctAnswers;
                    
                    saveProgress(currentQuiz.word);
                } else {
                    document.getElementById('result').innerText = "❌ 不正解...";
                    btn.style.background = "#f8d7da";
                    allBtns.forEach(b => { if(b.innerText === currentQuiz.meaning) b.style.background = "#d4edda"; });
                }
                document.getElementById('next-btn').style.display = "block";
            };
            optionsBox.appendChild(btn);
        });
    }

    function saveProgress(word) {
        if (!solvedWords.includes(word)) {
            solvedWords.push(word);
            localStorage.setItem('solvedWords', JSON.stringify(solvedWords));
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < 20) {
            loadQuiz();
        } else {
            switchScreen('score-screen');
            document.getElementById('correct-count').innerText = correctAnswers;
            let rate = Math.round((correctAnswers / 20) * 100);
            document.getElementById('accuracy-rate').innerText = rate;
            
            // 🥇 【追加】もし20問全問正解（満点）だったらメダルを増やす
            if (correctAnswers === 20) {
                document.getElementById('score-header').innerText = "神業！満点達成！ 👑";
                document.getElementById('perfect-message').style.display = "block";
                
                // 10個未満の時だけメダルを追加する
                if (medalCount < 10) {
                    medalCount++;
                    localStorage.setItem('medalCount', medalCount);
                }
            } else {
                document.getElementById('score-header').innerText = "結果発表 🎉";
                document.getElementById('perfect-message').style.display = "none";
            }
            
            updateMedalDisplay();
            generateWordsList();
        }
    }

    // 🥇 【追加】ホーム画面のメダル表示を最新状態に書き換える処理
    function updateMedalDisplay() {
        const container = document.getElementById('medal-slots-container');
        container.innerHTML = "";
        
        // 10個のマス目（スタンプ枠）を作る
        for (let i = 0; i < 10; i++) {
            const slot = document.createElement('div');
            slot.className = 'medal-slot';
            // 獲得している枚数分だけ「🥇」を表示する
            if (i < medalCount) {
                slot.innerText = "🥇";
            } else {
                slot.innerText = "";
            }
            container.appendChild(slot);
        }

        // メッセージの更新
        const msgEl = document.getElementById('medal-message');
        if (medalCount >= 10) {
            msgEl.innerHTML = "🎉 <b>スタンプカード達成！おめでとう！</b> 🎉";
            document.getElementById('medal-clear-btn').style.display = "block"; // 10個でボタン出現
        } else {
            msgEl.innerText = `💯 満点獲得メダル (${medalCount} / 10)`;
            document.getElementById('medal-clear-btn').style.display = "none";
        }
    }

    // 🥇 【追加】メダル単体だけをリセットするボタンの処理
    function resetMedalOnly() {
        if (confirm("集めたメダルをリセットして、新しいスタンプカードにしますか？")) {
            medalCount = 0;
            localStorage.setItem('medalCount', 0);
            updateMedalDisplay();
        }
    }

    function quitQuiz() {
        if (confirm("クイズを途中でやめてホームに戻りますか？")) {
            goHome();
        }
    }

    function startListMode() {
        switchScreen('list-screen');
        document.getElementById('search-input').value = "";
        generateWordsList(); 
        filterList();
    }

    function generateWordsList() {
        const listContainer = document.getElementById('words-list');
        listContainer.innerHTML = "";
        
        let currentSolvedCount = 0;

        allQuizList.forEach(item => {
            const hasSolved = solvedWords.includes(item.word);
            if (hasSolved) {
                currentSolvedCount++;
            }
            const checkMark = hasSolved ? "✅" : "";
            
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span class="list-word">
                    <span class="list-word-main">${item.word}</span>
                    <span class="list-word-yomi">（${item.yomi}）</span>
                </span>
                <span class="list-meaning">${item.meaning}</span>
                <span class="list-check">${checkMark}</span>
            `;
            listContainer.appendChild(div);
        });

        const totalCount = allQuizList.length;
        document.getElementById('total-count-text').innerText = totalCount;
        document.getElementById('solved-count-text').innerText = currentSolvedCount;
        
        let percent = totalCount > 0 ? Math.round((currentSolvedCount / totalCount) * 100) : 0;
        document.getElementById('progress-percent-text').innerText = percent;
        document.getElementById('progress-bar-fill').style.width = `${percent}%`;
    }

    function filterList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const items = document.querySelectorAll('.list-item');
        
        items.forEach(item => {
            const word = item.querySelector('.list-word-main').innerText.toLowerCase();
            const yomi = item.querySelector('.list-word-yomi').innerText.toLowerCase();
            const meaning = item.querySelector('.list-meaning').innerText.toLowerCase();
            
            if (word.includes(query) || yomi.includes(query) || meaning.includes(query)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // 💡 変更箇所：語句一覧の「クリア履歴をリセット」を押した時に、メダルも一緒にリセットする連動処理を追加
    function resetCheckedHistory() {
        if (confirm("これまでの正解記録、および【獲得したメダル】もすべて消去して完全リセットしますか？")) {
            localStorage.removeItem('solvedWords');
            localStorage.removeItem('medalCount'); // メダルのローカルストレージも削除
            solvedWords = [];
            medalCount = 0; // メダルを0にリセット
            
            updateMedalDisplay(); // ホームのメダルを更新
            generateWordsList();  // 達成率を更新
            alert("すべての学習記録とメダルをリセットしました！");
        }
    }

    function goHome() {
        switchScreen('home-screen');
    }

    parseData();
</script>
</body>
</html>
